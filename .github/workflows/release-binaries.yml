name: Release Binaries

on:
  push:
    tags:
      - 'ffmpeg-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. ffmpeg-8.1)'
        required: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip tar xz-utils

      - name: Download binaries
        run: |
          python3 scripts/download-ffmpeg.py

      - name: Verify output
        run: |
          ls -lh binaries
          echo
          cat binaries/SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: FFmpeg Sidecars ${{ env.TAG }}
          files: binaries/*
          body: |
            Prebuilt FFmpeg / FFprobe sidecar binaries for Lap.

            Version: FFmpeg 8.1

            Targets:
            - x86_64-apple-darwin
            - aarch64-apple-darwin
            - x86_64-pc-windows-msvc
            - aarch64-pc-windows-msvc
            - x86_64-unknown-linux-gnu
            - aarch64-unknown-linux-gnu

            Integrity:
            - SHA256SUMS.txt included
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}